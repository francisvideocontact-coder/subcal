<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubCal — Recalibrage SRT</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">SubCal<span class="logo-tag">v2</span></div>
  <div class="header-actions">
    <button id="btn-batch-toggle" class="btn btn-ghost">Batch</button>
  </div>
</header>

<!-- ── 3-COLUMN LAYOUT ─────────────────────────────────────────────────────── -->
<div id="app" class="app-layout">

  <!-- ════════════════════════════════════════════════════════════
       LEFT SIDEBAR — toujours visible
       ════════════════════════════════════════════════════════════ -->
  <aside class="sidebar-left">

    <!-- Drop zone (compact après chargement) -->
    <div id="drop-zone" class="drop-zone">
      <div class="drop-icon">⬇</div>
      <p id="drop-label">Glisse un <strong>.srt</strong> ici</p>
      <label class="btn btn-sm btn-ghost" for="file-input">Parcourir</label>
      <input type="file" id="file-input" accept=".srt" hidden>
    </div>

    <!-- Format selector -->
    <div class="section-label">Format</div>
    <div class="format-btns" id="format-btns">
      <button class="btn-format active" data-format="16:9">16:9</button>
      <button class="btn-format" data-format="9:16">9:16</button>
      <button class="btn-format" data-format="1:1">1:1</button>
    </div>

    <!-- FPS badge -->
    <div id="fps-badge" class="fps-badge hidden">Conversion FPS active</div>

    <!-- Config panel -->
    <details class="config-panel" id="config-details">
      <summary>Paramètres avancés</summary>
      <div class="config-grid">
        <div class="config-row">
          <label>CPL max <span id="lbl-cpl">40</span></label>
          <input type="range" id="cfg-cpl" min="15" max="60" value="40" step="1">
        </div>
        <div class="config-row">
          <label>CPS max <span id="lbl-cps">20</span></label>
          <input type="range" id="cfg-cps" min="12" max="25" value="20" step="0.5">
        </div>
        <div class="config-row">
          <label>Lignes max <span id="lbl-lines">2</span></label>
          <input type="range" id="cfg-lines" min="1" max="3" value="2" step="1">
        </div>
        <div class="config-row">
          <label>Durée min (s) <span id="lbl-mindur">1.0</span></label>
          <input type="range" id="cfg-mindur" min="0.5" max="2" value="1.0" step="0.1">
        </div>
        <div class="config-row">
          <label>Durée max (s) <span id="lbl-maxdur">10</span></label>
          <input type="range" id="cfg-maxdur" min="5" max="15" value="10" step="0.5">
        </div>
        <div class="config-row">
          <label>Gap min (ms) <span id="lbl-gap">120</span></label>
          <input type="range" id="cfg-gap" min="80" max="300" value="120" step="10">
        </div>
        <div class="config-row config-fps">
          <label>FPS source</label>
          <select id="cfg-fps-src">
            <option value="">—</option>
            <option value="23.976">23.976</option>
            <option value="24">24</option>
            <option value="25" selected>25</option>
            <option value="29.97">29.97</option>
            <option value="30">30</option>
            <option value="50">50</option>
            <option value="59.94">59.94</option>
            <option value="60">60</option>
          </select>
          <label>FPS cible</label>
          <select id="cfg-fps-tgt">
            <option value="">—</option>
            <option value="23.976">23.976</option>
            <option value="24">24</option>
            <option value="25">25</option>
            <option value="29.97">29.97</option>
            <option value="30">30</option>
            <option value="50">50</option>
            <option value="59.94">59.94</option>
            <option value="60">60</option>
          </select>
        </div>
        <div class="config-row config-toggle">
          <label>
            <input type="checkbox" id="cfg-semantic" checked>
            Segmentation sémantique
          </label>
        </div>
      </div>
    </details>

    <!-- Calibrate button + status -->
    <button id="btn-calibrate" class="btn btn-primary btn-lg" disabled>
      Calibrer
    </button>
    <div id="report-badge" class="report-badge hidden"></div>

    <!-- Export (visible après calibration) -->
    <div id="sidebar-actions" class="sidebar-actions hidden">
      <button id="btn-export" class="btn btn-ghost btn-full">Exporter SRT</button>
      <label class="btn btn-ghost btn-full">
        <input type="checkbox" id="filter-modified"> Modifiés seulement
      </label>
      <label class="btn btn-ghost btn-full">
        <input type="checkbox" id="filter-errors"> Erreurs seulement
      </label>
      <button id="btn-compare" class="btn btn-ghost btn-full">Avant / Après</button>
    </div>

  </aside>

  <!-- ════════════════════════════════════════════════════════════
       CENTER — état vide / blocs
       ════════════════════════════════════════════════════════════ -->
  <main class="center-panel">

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">⬇</div>
      <p>Glisse un fichier <strong>.srt</strong> dans le panneau gauche<br>pour commencer</p>
    </div>

    <!-- Block list (hidden until file loaded) -->
    <div id="block-list-wrap" class="block-list-wrap hidden">
      <div id="block-list-header" class="block-list-header">
        <span id="editor-filename" class="filename"></span>
        <span id="block-count" class="text-dim"></span>
        <span id="calibrated-badge" class="calibrated-badge hidden">Calibré</span>
      </div>
      <div id="block-list" class="block-list"></div>
    </div>

    <!-- Batch panel (hidden by default) -->
    <div id="batch-panel" class="batch-panel hidden">
      <div id="batch-drop-zone" class="drop-zone drop-zone--batch">
        <div class="drop-icon">⬇</div>
        <p>Glisse plusieurs <strong>.srt</strong> ici</p>
        <label class="btn btn-primary" for="batch-file-input">Choisir des fichiers</label>
        <input type="file" id="batch-file-input" accept=".srt" multiple hidden>
      </div>
      <div id="batch-file-list" class="batch-file-list"></div>
      <div class="format-selector">
        <span class="label">Format</span>
        <div class="format-btns" id="batch-format-btns">
          <button class="btn-format active" data-format="16:9">16:9</button>
          <button class="btn-format" data-format="9:16">9:16</button>
          <button class="btn-format" data-format="1:1">1:1</button>
        </div>
      </div>
      <button id="btn-batch-calibrate" class="btn btn-primary btn-lg" disabled>
        Calibrer tous et exporter ZIP
      </button>
      <div id="batch-results" class="batch-results"></div>
    </div>

  </main>

  <!-- ════════════════════════════════════════════════════════════
       RIGHT SIDEBAR — preview + player
       ════════════════════════════════════════════════════════════ -->
  <aside class="sidebar-right">

    <div class="preview-format-toggle">
      <button class="btn-format-preview active" data-ratio="16:9">16:9</button>
      <button class="btn-format-preview" data-ratio="9:16">9:16</button>
      <button class="btn-format-preview" data-ratio="1:1">1:1</button>
    </div>

    <div class="preview-wrap">
      <div class="preview-frame" id="preview-frame" data-ratio="16:9">
        <img id="preview-bg" class="preview-bg hidden" alt="">
        <div class="preview-safe-zone"></div>
        <div class="preview-subtitle" id="preview-subtitle"></div>
      </div>
      <label class="btn btn-ghost btn-sm preview-bg-btn" for="preview-bg-input">+ Fond</label>
      <input type="file" id="preview-bg-input" accept="image/*" hidden>
    </div>

    <div class="player">
      <div class="player-timecode" id="player-tc">00:00:00,000</div>
      <div class="player-progress-wrap" id="player-progress-wrap">
        <div class="player-progress" id="player-progress">
          <div class="player-cursor" id="player-cursor"></div>
        </div>
      </div>
      <div class="player-controls">
        <button id="btn-play" class="btn-play" title="Play/Pause" disabled>▶</button>
        <select id="player-speed" class="player-speed">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </div>
    </div>

  </aside>

</div><!-- /app-layout -->

<!-- ── LOADING OVERLAY ─────────────────────────────────────────────────────── -->
<div id="loading" class="loading hidden">
  <div class="spinner"></div>
  <p id="loading-msg">Calibrage en cours…</p>
</div>

<script src="/static/app.js"></script>
</body>
</html>
